<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JuandaFit - Entrenador Personal</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://unpkg.com">
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="preload" href="./assets/logo.webp" as="image">
<link rel="preload" href="./assets/app.js" as="script">
<link rel="preload" href="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" as="script" crossorigin>
<link rel="preload" href="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:auto;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1b2a}
#root{height:100%}
button,input,textarea,select{font-family:inherit}
textarea{resize:vertical}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e4a6a;border-radius:2px}
.scr{height:100dvh;display:flex;flex-direction:column;background:#0d1b2a}
.scrollable{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding-bottom:100px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#152535;border-bottom:1px solid #00bcd430;flex-shrink:0;min-height:52px}
.hdr-title{font-size:13px;font-weight:900;color:#ffffff;letter-spacing:.06em;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.hdr-back{color:#00bcd4;font-weight:700;font-size:13px;cursor:pointer;padding:4px 0;background:none;border:none}
.btn{width:100%;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;box-shadow:0 4px 15px #00bcd440}
.btn-primary:active{background:#007c8a}
.btn-secondary{background:transparent;border:1.5px solid #00bcd460;color:#e2f7fb}
.card{background:#152535;border:1px solid #00bcd425;border-radius:16px;padding:14px;margin-bottom:10px}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid #00bcd430;font-size:14px;color:#e2f7fb;background:#1a3347;outline:none;transition:.15s}
.inp:focus{border-color:#00bcd4;background:#1e3d54}
.label{font-size:10px;font-weight:700;color:#00e5ff;letter-spacing:.1em;margin-bottom:5px;display:block;text-transform:uppercase}
.err{color:#ff6b6b;font-size:12px;font-weight:600;margin-top:6px;text-align:center}
.badge{display:inline-flex;align-items:center;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:800}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #00bcd4;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
.wfc-top{background:#0d1b2a;padding:6px 16px 8px;border-bottom:1px solid #00bcd425;text-align:center;flex-shrink:0}
.wfc-top-txt{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:20px;font-weight:800;color:#00e5ff;letter-spacing:.12em;font-style:italic;text-shadow:0 0 16px #00bcd480}

/* Optimización móvil: evita cortes y reserva espacio para controles fijos */
html,body,#root{min-height:100%}
.scr{min-height:100dvh}
.scrollable{overscroll-behavior:contain}
.save-fixed,.save-bar{
  position:fixed!important;
  bottom:0!important;
  left:0!important;
  right:0!important;
  z-index:99999!important;
  padding:12px!important;
  background:#152535!important;
  border-top:1px solid #00bcd430!important;
}


/* Corrección notas/inputs: texto siempre visible sobre fondos oscuros */
textarea,
input,
select,
.inp{
  color:#e2f7fb!important;
  caret-color:#ffffff!important;
}
textarea::placeholder,
input::placeholder{
  color:#7aadbe!important;
}
.trainer-note-textarea{
  color:#ffffff!important;
  caret-color:#ffffff!important;
}



#root:empty::before{
  content:"JuandaFit";
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0d1b2a;
  color:#00e5ff;
  font:800 28px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  letter-spacing:.12em;
}
#root:empty::after{
  content:"";
  position:fixed;
  left:50%;
  top:calc(50% + 48px);
  width:26px;
  height:26px;
  margin-left:-13px;
  border:2px solid #00bcd4;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin .75s linear infinite;
}
</style>
<style>
.jf-shell-btn{width:100%;padding:14px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer}
.jf-shell-primary{border:none;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#fff;box-shadow:0 4px 15px #00bcd440;margin-bottom:12px}
.jf-shell-secondary{border:1.5px solid #00bcd460;background:transparent;color:#e2f7fb}
</style>
</head>
<body>
<div id="root">
  <div id="jf-fast-shell" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0d1b2a;color:#e2f7fb;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;text-align:center">
    <div style="width:100%;max-width:360px">
      <img src="./assets/logo.webp" alt="JuandaFit" width="128" height="128" decoding="async" fetchpriority="high" style="width:128px;height:128px;object-fit:contain;margin:0 auto 16px;display:block;filter:drop-shadow(0 0 20px #00bcd440)">
      <div style="font-size:30px;font-weight:900;letter-spacing:.14em;color:#00e5ff;text-shadow:0 0 18px #00bcd480;margin-bottom:10px">JuandaFit</div>
      <div style="height:3px;width:120px;margin:0 auto 28px;background:linear-gradient(90deg,transparent,#00bcd4,transparent);border-radius:99px"></div>
      <div style="font-size:18px;font-weight:900;color:#ffffff;letter-spacing:.05em;margin-bottom:18px">¿Cómo deseas ingresar?</div>
      <button class="jf-shell-btn jf-shell-primary" onclick="window.__JF_FAST_NAV='login';var m=document.getElementById('jf-fast-msg');if(m)m.textContent='Abriendo acceso de usuario...';this.disabled=true;">Soy Usuario</button>
      <button class="jf-shell-btn jf-shell-secondary" onclick="window.__JF_FAST_NAV='trainer_login';var m=document.getElementById('jf-fast-msg');if(m)m.textContent='Abriendo acceso de entrenador...';this.disabled=true;">Soy Entrenador</button>
      <div style="background:#152535;border:1px solid #00bcd430;border-radius:16px;padding:14px;margin-top:22px;box-shadow:0 18px 60px #00000035">
        <div style="display:inline-block;width:20px;height:20px;border:2px solid #00bcd4;border-top-color:transparent;border-radius:50%;margin:0 auto 8px;animation:spin .7s linear infinite"></div>
        <div id="jf-fast-msg" style="font-size:12px;color:#a8cdd8;line-height:1.5">Carga móvil extrema activada...</div>
      </div>
    </div>
  </div>
</div>
<script>
window.JF_LOGO_SRC='./assets/logo.webp';
window.__JF_EX_IMGS={};
window.__JF_EX_IMGS_LOADED=false;
window.__JF_EX_IMGS_LOADING=false;
window.JF_getEX_IMGS=function(){
  if(!window.__JF_EX_IMGS_LOADED && !window.__JF_EX_IMGS_LOADING){
    window.__JF_EX_IMGS_LOADING=true;
    fetch('./assets/ex-imgs.json',{cache:'force-cache'})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data){
        window.__JF_EX_IMGS=data||{};
        window.__JF_EX_IMGS_LOADED=true;
        window.__JF_EX_IMGS_LOADING=false;
        window.dispatchEvent(new Event('jf-ex-imgs-ready'));
      })
      .catch(function(e){
        window.__JF_EX_IMGS_LOADING=false;
        console.warn('No se pudieron cargar imágenes de ejercicios:', e);
      });
  }
  return window.__JF_EX_IMGS||{};
};
window.JF_EX_IMGS=new Proxy({},{
  get:function(t,p){ return window.JF_getEX_IMGS()[p]; },
  has:function(t,p){ return p in window.JF_getEX_IMGS(); },
  ownKeys:function(){ return Reflect.ownKeys(window.JF_getEX_IMGS()); },
  getOwnPropertyDescriptor:function(t,p){
    var v=window.JF_getEX_IMGS()[p];
    return v===undefined ? undefined : {enumerable:true, configurable:true};
  }
});
(function(){
  function msg(t){ var el=document.getElementById('jf-fast-msg'); if(el) el.textContent=t; }
  function fatal(){
    document.body.style.cssText='background:#0d1b2a;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;';
    document.body.innerHTML='<div style="text-align:center;color:#e2f7fb;padding:32px;max-width:320px"><div style="font-size:48px;margin-bottom:16px">📡</div><div style="font-size:18px;font-weight:700;color:#00bcd4;margin-bottom:12px">No se pudo cargar JuandaFit</div><div style="font-size:13px;color:#a8cdd8;line-height:1.6">Verifica la conexión a internet y recarga la página.</div><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;border-radius:12px;border:none;background:#00bcd4;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Reintentar</button></div>';
  }
  function evalCachedScript(cacheKey, testFn, label){
    try{
      if(testFn && testFn()) return true;
      var cached=localStorage.getItem(cacheKey);
      if(!cached) return false;
      var s=document.createElement('script');
      s.text=String(cached)+'\n//# sourceURL='+label+'-cached.js';
      document.head.appendChild(s);
      setTimeout(function(){ try{s.remove();}catch(e){} }, 0);
      return !testFn || testFn();
    }catch(e){
      console.warn('cache '+label+':', e);
      return false;
    }
  }
  function loadScript(urls, testFn, label, timeoutMs){
    urls = Array.isArray(urls) ? urls : [urls];
    var i=0;
    return new Promise(function(resolve,reject){
      function next(){
        if(testFn && testFn()) return resolve(true);
        if(i>=urls.length) return reject(new Error('No se pudo cargar '+label));
        var url=urls[i++];
        var s=document.createElement('script');
        var done=false;
        var timer=setTimeout(function(){
          if(done) return; done=true;
          try{s.remove();}catch(e){}
          next();
        }, timeoutMs||2600);
        s.src=url;
        s.async=true;
        s.crossOrigin='anonymous';
        s.onload=function(){
          if(done) return; done=true; clearTimeout(timer);
          if(!testFn || testFn()) resolve(true); else next();
        };
        s.onerror=function(){
          if(done) return; done=true; clearTimeout(timer); next();
        };
        document.head.appendChild(s);
      }
      next();
    });
  }
  msg('Cargando núcleo ultraligero...');
  Promise.resolve()
  .then(function(){
    if(evalCachedScript('jf_cache_react_18_prod_v2', function(){return !!window.React;}, 'react18')) return true;
    return loadScript([
      'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js',
      'https://unpkg.com/react@18/umd/react.production.min.js'
    ], function(){return !!window.React;}, 'React', 2400);
  })
  .then(function(){
    msg('Montando interfaz...');
    if(evalCachedScript('jf_cache_reactdom_18_prod_v2', function(){return !!window.ReactDOM;}, 'reactdom18')) return true;
    return loadScript([
      'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js',
      'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'
    ], function(){return !!window.ReactDOM;}, 'ReactDOM', 2400);
  })
  .then(function(){ msg('Entrando...'); return loadScript('./assets/app.js', null, 'JuandaFit', 10000); })
  .catch(function(e){ console.warn(e); fatal(); });
  if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(e){console.warn('sw:',e);});
    });
  }
})();
</script>
</body>
</html>
