<script>

// localStorage usado como backend local



// ─── TRAINER CONFIG (color/display, separate from Auth) ────────────────────────
// El entrenador se autentica con su PIN (guardado en localStorage).
// Su rol está en users[email].role = "trainer".
// Color themes are stored in users/{uid} as well.
// For MVP, fallback color map by trainer email or name:
// ─── DB HELPERS ────────────────────────────────────────────────────────────────
// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────
var auth, db_fs;
const firebaseConfig = {
  apiKey: "AIzaSyBWWV64ZZb0T3a2tDYjbLfBt41Btt5_x3c",
  authDomain: "juandafit.firebaseapp.com",
  projectId: "juandafit",
  storageBucket: "juandafit.firebasestorage.app",
  messagingSenderId: "196490142129",
  appId: "1:196490142129:web:48bcdc176d05e553cddd90"
};

function initFirebaseOnce(){
  if(auth && db_fs) return true;
  if(typeof firebase === 'undefined'){
    console.error('Firebase no disponible — verifica conexión a internet');
    return false;
  }
  try{
    if(!firebase.apps || !firebase.apps.length){
      firebase.initializeApp(firebaseConfig);
    }
    auth = firebase.auth();
    db_fs = firebase.firestore();
    try{ db_fs.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED }); }catch(e){}
    try{ db_fs.enablePersistence().catch(e => console.warn('Offline persistence:', e.code)); }catch(e){}
    console.log('Firebase iniciado correctamente');
    return true;
  }catch(e){
    console.error('Firebase init error:', e);
    return false;
  }
}

initFirebaseOnce();

// ─── DB (Firebase) ────────────────────────────────────────────────────────────
const DB = {

  // ── Auth ────────────────────────────────────────────────────────────────────
  async registerUser(email, password, name, tel){
    const cred = await auth.createUserWithEmailAndPassword(email.trim().toLowerCase(), password);
    const uid = cred.user.uid;
    const doc = {
      uid, email: email.trim().toLowerCase(), name, tel: tel||'', role:'user',
      accessStatus:'active', accessReason:'',
      profileStatus:'pending', objetivo:'', frecuencia:'', peso:'',
      estatura:'', edad:'', condicion:'', createdAt: Date.now()
    };
    await db_fs.collection('users').doc(uid).set(doc);
    return doc;
  },

  async loginUser(email, password){
    const cred = await auth.signInWithEmailAndPassword(email.trim().toLowerCase(), password);
    const snap = await db_fs.collection('users').doc(cred.user.uid).get();
    if(!snap.exists) throw new Error('Usuario no encontrado.');
    return snap.data();
  },

  async logoutUser(){
    localStorage.removeItem('jf_current_session');
    await auth.signOut();
  },

  async resetPassword(email){
    try{
      await auth.sendPasswordResetEmail(email.trim().toLowerCase());
    }catch(e){}
    return true;
  },

  getSession(email){
    return localStorage.getItem('jf_current_session') === email ? {email} : null;
  },

  async getUserByUid(uid){
    const snap = await db_fs.collection('users').doc(uid).get();
    return snap.exists ? snap.data() : null;
  },

  async getUserByEmail(email){
    const q = await db_fs.collection('users').where('email','==',email.trim().toLowerCase()).limit(1).get();
    if(q.empty) return null;
    return q.docs[0].data();
  },

  async saveUserProfile(uid, data){
    await db_fs.collection('users').doc(uid).update(data);
    return true;
  },

  async getAllUsers(){
    const q = await db_fs.collection('users').where('role','==','user').get();
    return q.docs.map(d => d.data());
  },

  async deleteUserData(uid, email){
    await db_fs.collection('users').doc(uid).delete();
    await db_fs.collection('routines').doc(uid).delete();
    return true;
  },

  async uploadAvatar(uid, base64){
    await db_fs.collection('users').doc(uid).update({avatar: base64});
    return base64;
  },

  async getAvatarUrl(uid){ return null; },

  // ── Trainer auth con PIN ─────────────────────────────────────────────────────
  async loginTrainer(email, pin){
    // El trainer se autentica por email+PIN guardado en Firestore
    const q = await db_fs.collection('users').where('email','==',email.trim().toLowerCase()).where('role','==','trainer').limit(1).get();
    if(q.empty) throw new Error('No se encontró el entrenador.');
    const doc = q.docs[0].data();
    if(doc.pin !== pin) throw new Error('PIN incorrecto.');
    return doc;
  },

  // ── Rutinas ──────────────────────────────────────────────────────────────────
  async getRoutine(uid){
    const snap = await db_fs.collection('routines').doc(uid).get();
    return snap.exists ? (snap.data().days || {}) : {};
  },

  async getAllRoutines(uid){
    return this.getRoutine(uid);
  },

  async saveRoutine(uid, day, exercises){
    // Guardar como objeto anidado real que Firestore entiende
    var update = {};
    update['days'] = {};
    // Primero leer la rutina actual y mergear
    try{
      var existing = await this.getRoutine(uid);
      update['days'] = Object.assign({}, existing);
    }catch(e){}
    update['days'][day] = exercises;
    await db_fs.collection('routines').doc(uid).set(update, {merge: true});
    return true;
  },

  // ── Notas de ejercicio (por usuario) ─────────────────────────────────────────
  async getNote(uid, exId){
    const snap = await db_fs.collection('notes').doc(uid).get();
    if(!snap.exists) return '';
    return (snap.data()[exId] || '');
  },

  async getNotes(uid){
    const snap = await db_fs.collection('notes').doc(uid).get();
    return snap.exists ? snap.data() : {};
  },

  async saveNote(uid, exId, note){
    await db_fs.collection('notes').doc(uid).set({[exId]: note}, {merge: true});
    return true;
  },

  // ── Info global de ejercicios ─────────────────────────────────────────────────
  async getExInfo(exId){
    const snap = await db_fs.collection('exInfo').doc(exId).get();
    return snap.exists ? snap.data() : null;
  },

  async getExerciseInfo(exId){ return this.getExInfo(exId); },

  async saveExInfo(exId, data){
    await db_fs.collection('exInfo').doc(exId).set(data, {merge: true});
    return true;
  },

  async saveExerciseInfo(exId, data){ return this.saveExInfo(exId, data); },

  // ── Biblioteca global de ejercicios personalizados ─────────────────────────────
  async getCustomExercises(){
    let items=[];

    // Fuente principal: catálogo global. Lo que se cree aquí aparece para todos
    // los entrenadores/clientes que carguen el catálogo.
    try{
      const q = await db_fs.collection('exerciseCatalog').where('global','==',true).get();
      items = items.concat(q.docs.map(d=>({id:d.id,...d.data()})));
    }catch(e){
      console.warn('getCustomExercises exerciseCatalog error:', e);
    }

    // Compatibilidad con versiones anteriores que guardaban los ejercicios en exInfo.
    try{
      const q2 = await db_fs.collection('exInfo').where('isCustomExercise','==',true).get();
      items = items.concat(q2.docs.map(d=>({id:d.id,...d.data()})));
    }catch(e){
      console.warn('getCustomExercises exInfo legacy error:', e);
    }

    // Fallback local solo para que el creador vea lo recién creado si hay latencia.
    try{
      const local = JSON.parse(localStorage.getItem('jf_custom_exercises')||'[]');
      if(Array.isArray(local))items = items.concat(local);
    }catch(e){}

    const seen={};
    return items.filter(x=>x&&x.id&&!seen[x.id]&&(seen[x.id]=true));
  },

  async saveCustomExercise(exercise, info){
    const now=Date.now();
    const payload = {
      ...exercise,
      ...info,
      id: exercise.id,
      name: exercise.name || info.name || '',
      category: exercise.category || info.category || '',
      zone: exercise.zone || info.zone || 'Personalizado',
      machine: exercise.machine || info.machine || 'Personalizado',
      video: exercise.video || info.video || '',
      customImg: exercise.customImg || info.customImg || info.image || '',
      global: true,
      isGlobalExercise: true,
      isCustomExercise: true,
      custom: true,
      createdAt: info.createdAt || now,
      updatedAt: now
    };

    // Guardado global del catálogo: todos leen de aquí.
    // Si las reglas de Firestore aún no permiten esta colección nueva, no se rompe:
    // exInfo queda como respaldo global compatible con la versión anterior.
    try{
      await db_fs.collection('exerciseCatalog').doc(payload.id).set(payload, {merge:true});
    }catch(e){
      console.warn('saveCustomExercise exerciseCatalog fallback to exInfo:', e);
    }

    // Guardado paralelo de info del ejercicio: descripción, imagen y links usados
    // por ExerciseScreen, por la edición global existente y como respaldo global.
    await db_fs.collection('exInfo').doc(payload.id).set(payload, {merge:true});

    try{
      const local = JSON.parse(localStorage.getItem('jf_custom_exercises')||'[]').filter(x=>x&&x.id!==payload.id);
      local.push(payload);
      localStorage.setItem('jf_custom_exercises', JSON.stringify(local));
    }catch(e){}
    return payload;
  },

  watchCustomExercises(cb){
    try{
      return db_fs.collection('exerciseCatalog')
        .where('global','==',true)
        .onSnapshot(snap=>{
          cb(snap.docs.map(d=>({id:d.id,...d.data()})));
        }, err=>console.warn('watchCustomExercises error:', err));
    }catch(e){
      console.warn('watchCustomExercises setup error:', e);
      return function(){};
    }
  },

  // ── Solicitudes de ayuda ──────────────────────────────────────────────────────
  async postHelp(data){
    await db_fs.collection('helpRequests').doc(data.userId).set({
      ...data,
      status: 'pending',
      createdAt: Date.now()
    });
    return true;
  },

  async requestHelp(data){ return this.postHelp(data); },

  async getHelpRequests(){
    const q = await db_fs.collection('helpRequests').where('status','==','pending').get();
    return q.docs.map(d => d.data());
  },

  async resolveHelp(userId){
    await db_fs.collection('helpRequests').doc(userId).update({status: 'resolved'});
    return true;
  },

  // Listener en tiempo real de solicitudes de ayuda
  onHelpRequests(trainerUid, cb){
    return db_fs.collection('helpRequests')
      .where('status','==','pending')
      .onSnapshot(snap => {
        cb(snap.docs.map(d => d.data()));
      });
  },

  // ── Asistencia ────────────────────────────────────────────────────────────────
  async setAtt(uid, day, status){
    const week = new Date().toISOString().slice(0,7);
    // Guardar como objeto anidado real: { "2026-06": { lun: {...} } }
    // Antes se usaba una clave con punto (`2026-06.lun`), pero getWeekAtt
    // lee datos anidados; por eso el día no quedaba verde aunque se guardara.
    await db_fs.collection('attendance').doc(uid).set({
      [week]: {
        [day]: {s: status, t: Date.now()}
      }
    }, {merge: true});
    return true;
  },

  async getWeekAtt(uid){
    const week = new Date().toISOString().slice(0,7);
    const snap = await db_fs.collection('attendance').doc(uid).get();
    if(!snap.exists) return {};
    const data = snap.data() || {};
    const nested = data[week] || {};
    // Compatibilidad con registros viejos guardados como "2026-06.lun".
    const legacy = {};
    Object.keys(data).forEach(k=>{
      if(k.indexOf(week+'.')===0){
        legacy[k.slice(week.length+1)] = data[k];
      }
    });
    return Object.assign({}, legacy, nested);
  },

  // ── Logs de ejercicio ─────────────────────────────────────────────────────────
  async getExerciseLog(uid, exId, date){
    const snap = await db_fs.collection('exerciseLogs').doc(uid).get();
    if(!snap.exists) return null;
    const data = snap.data() || {};
    // Formato correcto: { "2026-06-07": { E001: {...} } }
    const nested = (data[date] || {})[exId];
    // Compatibilidad con logs viejos guardados como clave plana "2026-06-07.E001".
    const legacy = data[`${date}.${exId}`];
    return nested || legacy || null;
  },

  async saveExerciseLog(uid, exId, date, data){
    // Guardar como objeto anidado real para que getExerciseLog pueda leerlo.
    await db_fs.collection('exerciseLogs').doc(uid).set({
      [date]: {
        [exId]: data
      }
    }, {merge: true});
    return true;
  },

  // ── Stubs compatibilidad ──────────────────────────────────────────────────────
  async updateActivity(uid, name){ return true; },
  async getActivity(){ return []; },
  watchUserProfile(uid, cb){
    try{
      return db_fs.collection('users').doc(uid).onSnapshot(snap=>{
        if(snap.exists && typeof cb==='function') cb(snap.data());
      }, err=>console.warn('watchUserProfile error:', err));
    }catch(e){
      console.warn('watchUserProfile setup error:', e);
      return function(){};
    }
  },
  watchNote(uid, exId, cb){ return function(){}; },
  watchExInfo(exId, cb){ return function(){}; },
  watchMachineStatus(id, cb){ return function(){}; },
  onExerciseNote(uid, exId, cb){ return function(){}; },
  claimHelp(){ return true; },
  unclaimHelp(){ return true; }
};

const ALL_EXERCISES = Object.values(CAT).filter(Array.isArray).flat();
function getEx(id){return Object.values(CAT).filter(Array.isArray).flat().find(e=>e.id===id);}
function catColor(cat){
  const colors={'PECHO · HOMBRO · TRICEPS':'#ef4444','ESPALDA · BICEPS':'#3b82f6','PIERNA':'#22c55e','GLÚTEO':'#a855f7','PILAR · ESTABILIDAD':'#f59e0b','MOVILIDAD':'#06b6d4','CARDIO · VASCULAR':'#00bcd4'};
  return colors[cat]||'#64748b';
}
function exColor(exId){
  for(const [cat,exs] of Object.entries(CAT)){ if(Array.isArray(exs) && exs.find(e=>e.id===exId)) return catColor(cat); }
  return '#64748b';
}
function getCategoryOptions(){
  return Object.keys(CAT).filter(k=>Array.isArray(CAT[k]));
}
function mergeCustomExercises(customs){
  if(!Array.isArray(customs))return;
  customs.forEach(raw=>{
    if(!raw || !raw.id || !raw.name)return;
    const cat = raw.category || raw.cat || getCategoryOptions()[0];
    if(!cat || !CAT[cat])return;
    const ex = {
      id: raw.id,
      name: raw.name,
      zone: raw.zone || 'Personalizado',
      machine: raw.machine || 'Personalizado',
      video: raw.video || (raw.links&&raw.links[0]&&raw.links[0].url) || '',
      category: cat,
      custom: true,
      customImg: raw.customImg || raw.image || ''
    };
    const idx = CAT[cat].findIndex(e=>e.id===ex.id);
    if(idx>=0)CAT[cat][idx]={...CAT[cat][idx],...ex};
    else CAT[cat].push(ex);
  });
}
function defaultNewExerciseDraft(){
  return {name:'',category:getCategoryOptions()[0]||'',image:'',link:'',description:''};
}

function getExerciseImage(ex, info){
  if(!ex)return null;
  return (info&&info.customImg) || ex.customImg || ex.image || EX_IMGS[ex.id] || null;
}
function compressImageFile(file, cb, onErr){
  if(!file)return;
  const reader = new FileReader();
  reader.onerror = ()=>{ if(onErr)onErr(); };
  reader.onload = ()=>{
    const img = new Image();
    img.onerror = ()=>cb(reader.result);
    img.onload = ()=>{
      try{
        const max = 700;
        let w = img.width || max, h = img.height || max;
        if(w>h && w>max){ h = Math.round(h*max/w); w = max; }
        else if(h>=w && h>max){ w = Math.round(w*max/h); h = max; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        cb(canvas.toDataURL('image/jpeg',0.76));
      }catch(e){ cb(reader.result); }
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function isAccessBlocked(user){
  return !!(user && (user.accessStatus==='blocked' || user.accessBlocked===true || user.paymentStatus==='blocked' || user.paymentStatus==='overdue'));
}
function getAccessStatus(user){
  return isAccessBlocked(user) ? 'blocked' : 'active';
}
function accessBadgeStyle(user){
  const blocked=isAccessBlocked(user);
  return {display:'inline-flex',alignItems:'center',gap:4,borderRadius:999,padding:'3px 8px',fontSize:9,fontWeight:900,letterSpacing:'.04em',background:blocked?'#ef444420':'#16a34a20',border:'1px solid '+(blocked?'#ef444455':'#16a34a55'),color:blocked?'#fca5a5':'#86efac'};
}
function accessLabel(user){
  return isAccessBlocked(user)?'ACCESO BLOQUEADO':'ACCESO ACTIVO';
}

// ─── ERROR BOUNDARY ──────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={error:null}; }
  static getDerivedStateFromError(e){ return {error:e}; }
  componentDidCatch(e,info){ console.error('[CRASH] error:', e, info); }
  render(){
    if(this.state.error) return React.createElement('div',{style:{padding:30,color:'#ef4444',fontWeight:700,fontSize:14}},
      'Error al renderizar: ' + this.state.error.message
    );
    return this.props.children;
  }
}

(async function initTrainer(){

  try{

})();

let useState, useEffect, useRef, useCallback;

function App(){
  // authReady: false mientras Firebase verifica sesión inicial
  const [authReady, setAuthReady] = useState(false);
  const [user, setUser] = useState(null);
  const [trainer, setTrainer] = useState(null);

  // Cargar el catálogo global al iniciar la app. Así los ejercicios creados por
  // el entrenador existen como biblioteca común, no solo dentro de una rutina.
  useEffect(()=>{
    let mounted=true;
    async function loadGlobalExerciseCatalog(){
      try{
        const customs = await DB.getCustomExercises();
        if(mounted) mergeCustomExercises(customs);
      }catch(e){
        console.warn('global exercise catalog load error:', e);
      }
    }
    loadGlobalExerciseCatalog();
    const unsub = DB.watchCustomExercises(customs=>{
      if(mounted) mergeCustomExercises(customs||[]);
    });
    return ()=>{mounted=false; if(typeof unsub==='function')unsub();};
  },[]);

  useEffect(()=>{
    // Restaurar sesión: Firebase Auth para usuarios, localStorage para trainer
    // Timeout de seguridad: si Firebase no responde en 6s, mostrar la app igual
    const safetyTimeout = setTimeout(()=>setAuthReady(true), 6000);

    if(!auth){
      // Firebase no disponible — limpiar y mostrar app
      console.error('Firebase Auth no disponible');
      clearTimeout(safetyTimeout);
      setAuthReady(true);
      return;
    }

    const unsubAuth = auth.onAuthStateChanged(async (firebaseUser) => {
      clearTimeout(safetyTimeout);
      try{
        if(firebaseUser){
          const doc = await DB.getUserByUid(firebaseUser.uid);
          if(doc && doc.role==='trainer'){
            const theme = getTrainerTheme(0);
            setTrainer({...doc,...theme});
            setUser(null);
          } else if(doc && doc.role==='user'){
            setUser(doc);
            setTrainer(null);
          }
        } else {
          // Sin sesión Firebase — verificar trainer con PIN en localStorage
          const savedEmail = localStorage.getItem('jf_current_session');
          if(savedEmail){
            try{
              const doc = await DB.getUserByEmail(savedEmail);
              if(doc && doc.role==='trainer'){
                const theme = getTrainerTheme(0);
                setTrainer({...doc,...theme});
                setUser(null);
              }
            }catch(e){ console.warn('trainer session restore:',e); }
          }
        }
      }catch(e){ console.warn('session restore error',e); }
      setAuthReady(true);
    });
    return ()=>{ clearTimeout(safetyTimeout); unsubAuth && unsubAuth(); };
  },[]);

  // Derivar pantalla del estado, no de una variable separada
  const scr = !authReady ? 'splash'
    : trainer ? 'trainer'
    : user    ? 'home'
    : 'choose';
  const setScr = (s)=>{ if(s==='choose'||s==='login'||s==='trainer_login') _setNavScr(s); };
  const [navScr, _setNavScr] = useState(null);
  const efectiveScr = (navScr && !trainer && !user) ? navScr : scr;

  // Real-time profile listener — actualiza sin cerrar sesión
  useEffect(()=>{
    if(!user || !user.uid) return;
    const unsub = DB.watchUserProfile(user.uid, data=>{
      setUser(prev=>prev?{...prev,...data}:data);
    });
    return ()=>{ if(typeof unsub==='function') unsub(); };
  },[user&&user.uid]);

  // Activity ping
  useEffect(()=>{
    if(!user || !user.uid) return;
    DB.updateActivity(user.uid, user.name);
    const iv = setInterval(()=>DB.updateActivity(user.uid, user.name), 30000);
    return ()=>clearInterval(iv);
  },[user&&user.uid]);

  async function logout(){
    const email = localStorage.getItem('jf_current_session');
    if(email) await DB.logoutUser(email);
    localStorage.removeItem('jf_current_session');

// ─── TOAST helper ─────────────────────────────────────────────────────────────
function Toast({msg,type='ok'}){
  const bg = type==='err'?'#ef4444':type==='warn'?'#f59e0b':'#22c55e';
  return msg?React.createElement('div',{style:{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:bg,color:'#fff',padding:'10px 20px',borderRadius:10,fontWeight:700,fontSize:13,zIndex:999,boxShadow:'0 4px 16px rgba(0,0,0,.2)',animation:'fadeIn .2s ease'}},msg):null;
}
function useToast(){
  const [toast,setToast]=useState(null);
  function show(msg,type='ok',ms=2500){
    setToast({msg,type});
    setTimeout(()=>setToast(null),ms);
  }
  return [toast,show];
}

// ─── TRAINER LOGIN ─────────────────────────────────────────────────────────────
function TrainerLoginScreen({onBack, onLogin}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function doLogin(){
    if(!pin||pin.length<3){setErr('Ingresa tu PIN');return;}
    setLoading(true);setErr('');
    try{
      // 1. Verificar PIN en Firestore (lectura pública)
      const snap = await db_fs.collection('users').where('role','==','trainer').limit(1).get();
      if(snap.empty) throw new Error('No hay entrenador registrado.');
      const trainerDoc = snap.docs[0].data();
      if(String(trainerDoc.pin) !== String(pin)) throw new Error('PIN incorrecto.');

      // 2. Autenticar con Firebase Auth real (email+PIN como password)
      // Esto permite escribir en Firestore con las reglas normales
      const email = trainerDoc.email;
      const password = 'juandafit_' + pin; // password derivada del PIN
      try{
        await auth.signInWithEmailAndPassword(email, password);
      }catch(authErr){
        if(authErr.code === 'auth/user-not-found' || authErr.code === 'auth/invalid-credential' || authErr.code === 'auth/wrong-password'){
          // Primera vez: crear el usuario en Firebase Auth
          try{
            await auth.createUserWithEmailAndPassword(email, password);
          }catch(createErr){
            // Si ya existe pero con otra contraseña, actualizar
            console.warn('Auth create error:', createErr.code);
          }
        }
      }

      localStorage.setItem('jf_current_session', email);
      const theme = getTrainerTheme(0);
      if(onLogin) onLogin({...trainerDoc,...theme}, null);
    }catch(e){
      setLoading(false);
      setErr(e.message||'PIN incorrecto. Intenta de nuevo.');
    }
  }

  return React.createElement('div',{className:'scr',style:{background:'#0d1b2a'}},
    React.createElement(BrandLogo,null),
    React.createElement('div',{className:'scrollable',style:{padding:24,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'80vh'}},

      React.createElement('div',{style:{fontSize:12,color:'#7aadbe',textAlign:'center',marginBottom:28}},'Ingresa tu PIN para continuar'),
      React.createElement('div',{style:{width:'100%',maxWidth:280}},
        React.createElement('input',{
          className:'inp',
          type:'password',
          inputMode:'numeric',
          value:pin,
          onChange:e=>setPin(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter')doLogin();},
          placeholder:'PIN',
          style:{
            textAlign:'center',
            fontSize:28,
            fontWeight:900,
            letterSpacing:'0.3em',
            fontFamily:"'Rajdhani',sans-serif",
            marginBottom:16
          }
        }),
        err&&React.createElement('div',{className:'err',style:{marginBottom:12}},err),
        loading?
          React.createElement('div',{style:{textAlign:'center',padding:12}},React.createElement('div',{className:'spin'})):

// ─── TRAINING SCREEN ──────────────────────────────────────────────────────────
function TrainingScreen({user,day,routines,weekAtt,onBack,onSelectEx}){
  const exs = routines[day]||[];
  const att = weekAtt[day];
  const [helpSent,setHelpSent]=useState(false);
  const [helping,setHelping]=useState(false);
  const [logs,setLogs]=useState({});
  const today=new Date().toISOString().slice(0,10);

  useEffect(()=>{
    async function loadLogs(){
      const logMap={};
      for(const ex of exs){
        const l=await DB.getExerciseLog(user.uid,ex.id,today);
        if(l)logMap[ex.id]=l;
      }
      setLogs(logMap);
    }
    if(exs.length)loadLogs();
  },[day,exs.length]);

  const doneCount=Object.values(logs).filter(l=>l&&l.allDone).length;
  const pct=exs.length>0?Math.round(doneCount/exs.length*100):0;

  async function markAtt(status){
    await DB.setAtt(user.uid,day,status);
    onBack();
  }

  async function sendHelp(){
    setHelping(true);
    try{
      await DB.postHelp({userId:user.uid,userName:user.name,day:DAY_LABELS[day],
        exercisesDone:doneCount,exercisesTotal:exs.length,
        age:user.age,cond:user.cond});
      setHelpSent(true);
    }catch(e){}

// ─── EXERCISE SCREEN ──────────────────────────────────────────────────────────
function ExerciseScreen({user,day,exercise:ex,routine,onBack}){
  const today=new Date().toISOString().slice(0,10);

  const [log,setLog]=useState(null);
  const [note,setNote]=useState('');
  const [exInfo,setExInfo]=useState(null);
  const [helpSent,setHelpSent]=useState(false);
  const [helping,setHelping]=useState(false);
  const [restTimer,setRestTimer]=useState(null);
  const [localSets,setLocalSets]=useState(parseInt(ex.sets)||3);
  const [localReps,setLocalReps]=useState(parseInt(ex.reps)||10);
  const [localRest,setLocalRest]=useState(parseInt(ex.rest)||60);

  const restRef=React.useRef(null);

  // Cargar log + nota + info del ejercicio
  useEffect(()=>{
    async function load(){
      const l=await DB.getExerciseLog(user.uid,ex.id,today);
      if(l){setLog(l);}
      else{setLog({sets:Array.from({length:localSets},(_,i)=>({reps:localReps,done:false,repsDone:localReps})),allDone:false});}
      const n=await DB.getNote(user.uid,ex.id);
      setNote(n||'');
      const info=await DB.getExInfo(ex.id);
      setExInfo(info||null);
    }
    load();
    return()=>{if(restRef.current)clearInterval(restRef.current);};
  },[ex.id]);

  function startRest(sec){
    if(restRef.current)clearInterval(restRef.current);
    setRestTimer(sec);
    restRef.current=setInterval(()=>{
      setRestTimer(p=>{
        if(p<=1){clearInterval(restRef.current);setRestTimer(null);return 0;}
        return p-1;
      });
    },1000);
  }

  async function maybeAutoCompleteDay(currentExerciseId, currentLog){
    if(!routine || routine.length===0 || !currentLog || !currentLog.allDone)return;
    try{
      let completed=0;
      for(const rex of routine){
        const l = rex.id===currentExerciseId ? currentLog : await DB.getExerciseLog(user.uid,rex.id,today);
        if(l && l.allDone)completed++;
      }
      if(completed===routine.length){
        await DB.setAtt(user.uid,day,'done');
      }
    }catch(e){console.warn('No se pudo autocompletar el día:',e);}
  }

  async function toggleSet(i){
    if(!log)return;
    const wasDown=!log.sets[i].done;
    const newSets=log.sets.map((s,idx)=>idx===i?{...s,done:!s.done}:s);
    const allDone=newSets.every(s=>s.done);
    const nl={...log,sets:newSets,allDone};
    setLog(nl);
    await DB.saveExerciseLog(user.uid,ex.id,today,nl);
    if(allDone)await maybeAutoCompleteDay(ex.id,nl);
    if(wasDown)startRest(localRest);
  }

  async function updateRepsDone(i,val){
    if(!log)return;
    const newSets=log.sets.map((s,idx)=>idx===i?{...s,repsDone:parseInt(val)||0}:s);
    const nl={...log,sets:newSets,allDone:newSets.every(s=>s.done)};
    setLog(nl);
    await DB.saveExerciseLog(user.uid,ex.id,today,nl);
  }

  async function changeSets(delta){
    const ns=Math.max(1,localSets+delta);
    setLocalSets(ns);
    const newSets=Array.from({length:ns},(_,i)=>(log && log.sets ? log.sets[i] : null)||{reps:localReps,done:false,repsDone:localReps});
    const nl={...(log||{}),sets:newSets,allDone:newSets.every(s=>s.done)};
    setLog(nl);
    await DB.saveExerciseLog(user.uid,ex.id,today,nl);
  }

  async function sendHelp(){
    setHelping(true);
    try{
      await DB.postHelp({userId:user.uid,userName:user.name,day:DAY_LABELS[day],
        exercise:ex.name,exerciseId:ex.id,
        exercisesTotal:routine.length,
        age:user.age,cond:user.cond});
      setHelpSent(true);
    }catch(e){}
    setHelping(false);
  }

  function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  const c=exColor(ex.id);

  return React.createElement('div',{className:'scr'},
    React.createElement(BrandLogo,null),
    React.createElement('div',{className:'hdr'},
      React.createElement('button',{className:'hdr-back',onClick:onBack},'Volver'),
      React.createElement('div',{className:'hdr-title'},ex.id),
      React.createElement('div',{style:{fontSize:10,fontWeight:700,color:c}},ex.zone||'')
    ),
    React.createElement('div',{className:'scrollable',style:{padding:14,background:'#0d1b2a'}},

      // Cabecera del ejercicio
      React.createElement('div',{style:{
        display:'flex',gap:14,alignItems:'center',
        background:'#152535',borderRadius:18,padding:14,
        border:'1.5px solid '+c+'44',marginBottom:12,
        borderLeft:'4px solid '+c
      }},
        React.createElement('div',{style:{width:72,height:72,borderRadius:14,overflow:'hidden',background:'#0d1b2a',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid '+c+'33'}},
          getExerciseImage(ex,exInfo)?
            React.createElement('img',{src:getExerciseImage(ex,exInfo),loading:'lazy',decoding:'async',style:{width:'100%',height:'100%',objectFit:'contain'}}):

        ),
        React.createElement('div',{style:{flex:1}},

        )
      ),

      // Nota del entrenador
      note&&React.createElement('div',{style:{

      }},

        )

      // Descripción del ejercicio (trainer)
      exInfo&&exInfo.description&&React.createElement('div',{style:{

      }},
        React.createElement('div',{style:{fontSize:20,flexShrink:0,display:"none"}},''),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:10,fontWeight:900,color:'#4ade80',letterSpacing:'.08em',marginBottom:4}},'DESCRIPCIÓN'),
          React.createElement('div',{style:{fontSize:13,color:'#e2f7fb',lineHeight:1.6}},exInfo.description)
        )
      ),

      // Videos/tutoriales
      (()=>{
        let urls=[];
        if(exInfo!==null){
          if(Array.isArray(exInfo.links)){
            urls=exInfo.links.filter(l=>l.url&&l.url.trim());
          } else {
            const defaultLabels=['Ver tutorial','Tutorial alternativo','Tutorial extra'];
            ['video','video2','video3'].forEach((k,i)=>{

            });

        }
        if(urls.length===0)return null;
        return React.createElement('div',{style:{marginBottom:12}},
          urls.map((lk,i)=>{

      // Tip

function TrainerPanel({trainer,onLogout}){
  const [users,setUsers]=useState([]);
  const [helpReqs,setHelpReqs]=useState([]);
  const [selUser,setSelUser]=useState(null);
  const [view,setView]=useState('list');
  const [search,setSearch]=useState('');
  const [deletingUser,setDeletingUser]=useState(null);

  // Polling de solicitudes de ayuda (cada 5s)
  useEffect(()=>{
    if(!trainer||!trainer.uid)return;
    // Listener en tiempo real de solicitudes de ayuda (Firestore onSnapshot)
    const unsub = db_fs.collection('helpRequests')
      .where('status','==','pending')
      .onSnapshot(snap=>{
        const reqs = snap.docs.map(d=>d.data())
          .filter(r=>(Date.now()-(r.createdAt||0))<30*60*1000)
          .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
        setHelpReqs(reqs);
      }, err=>console.warn('helpReqs listener error',err));
    return()=>unsub();
  },[trainer&&trainer.uid]);

  // Polling de usuarios (cada 15s)
  useEffect(()=>{
    // Listener en tiempo real de usuarios (Firestore onSnapshot)
    const unsub = db_fs.collection('users')
      .where('role','==','user')
      .onSnapshot(snap=>{
        setUsers(snap.docs.map(d=>d.data()));
      }, err=>console.warn('users listener error',err));
    return()=>unsub();
  },[]);

  async function deleteUser(u){
    const ok=window.confirm('¿Eliminar a '+u.name+' definitivamente?\n\nEsto borrará su perfil, rutinas y notas. No se puede deshacer.');
    if(!ok)return;
    setDeletingUser(u.uid||u.email);
    try{
      await DB.deleteUserData(u.uid||u.email,u.email,trainer);
      setUsers(us=>us.filter(x=>(x.uid||x.email)!==(u.uid||u.email)));
    }catch(e){
      alert('Error al eliminar: '+(e.message||'intenta de nuevo'));
    }
    setDeletingUser(null);
  }

  async function resolveReq(userId){
    try{ await DB.resolveHelp(userId); }
    catch(e){ console.error('resolve error',e); }
  }

  if(view==='ficha'&&selUser) return React.createElement(UserFicha,{user:selUser,trainer,onBack:()=>{setView('list');setSelUser(null);}});

  const filtered=search?users.filter(u=>u.name&&u.name.toLowerCase().includes(search.toLowerCase())):users;


  return React.createElement('div',{className:'scr'},
    React.createElement(BrandLogo,null),
    React.createElement('div',{className:'hdr'},
      React.createElement('div',null,
        React.createElement('div',{style:{fontWeight:800,fontSize:14,color:'#00bcd4'}},trainer.name),
        React.createElement('div',{style:{fontSize:11,color:'#a8cdd8'}},'Panel Entrenador')
      ),
      React.createElement('button',{onClick:onLogout,style:{
        border:'1px solid #00bcd440',background:'transparent',color:'#00bcd4',
        borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:700,cursor:'pointer'
      }},'Salir')
    ),
    React.createElement('div',{className:'scrollable',style:{padding:14,background:'#0d1b2a'}},

      // ── Solicitudes de ayuda ──
      helpReqs.length>0&&React.createElement('div',{style:{marginBottom:16}},
        React.createElement('div',{style:{
          fontSize:10,fontWeight:900,color:'#7c3aed',letterSpacing:'.1em',marginBottom:10
        }},'SOLICITUDES ACTIVAS ('+helpReqs.length+')'),
        helpReqs.map(req=>{
          const mins=Math.round((Date.now()-(req.createdAt||0))/60000);
          const urgColor=mins>=10?'#ef4444':mins>=5?'#f59e0b':'#7c3aed';
          return React.createElement('div',{key:req.userId,style:{
            background:'linear-gradient(135deg,#1a0a2e,#0f1a30)',
            border:'1.5px solid '+urgColor+'55',
            borderRadius:16,padding:'14px',marginBottom:8,
            display:'flex',gap:12,alignItems:'flex-start'
          }},
            React.createElement('div',{style:{
              width:44,height:44,borderRadius:12,flexShrink:0,
              background:'linear-gradient(135deg,'+urgColor+','+urgColor+'aa)',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:20,boxShadow:'0 4px 14px '+urgColor+'40'
            }},''),
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{style:{fontWeight:700,color:'#e2f7fb',fontSize:14}},req.userName),
              React.createElement('div',{style:{fontSize:11,color:'#b8d5de',marginTop:2}},
                (req.exercise?req.exercise+' · ':'')+req.day),
              React.createElement('div',{style:{fontSize:10,color:urgColor,fontWeight:700,marginTop:4}},
                mins<1?'Ahora mismo':'Hace '+mins+' min')
            ),
            React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6}},
              React.createElement('button',{
                onClick:()=>resolveReq(req.userId),
                style:{padding:'7px 12px',borderRadius:10,border:'none',
                  background:'#16a34a',color:'#fff',fontWeight:700,fontSize:11,cursor:'pointer'}
              },'Atendido'),
              React.createElement('button',{
                onClick:()=>{setSelUser(users.find(u=>u.uid===req.userId||u.email===req.userEmail));setView('ficha');},
                style:{padding:'7px 12px',borderRadius:10,border:'1px solid #00bcd440',
                  background:'transparent',color:'#00bcd4',fontWeight:700,fontSize:11,cursor:'pointer'}
              },'Ver ficha')
            )
          );
        })
      ),

      // ── Buscador ──
      React.createElement('input',{
        className:'inp',
        placeholder:'Buscar cliente...',
        value:search,
        onChange:e=>setSearch(e.target.value),
        style:{marginBottom:12,fontSize:14}
      }),

      // ── Lista de clientes ──
      React.createElement('div',{style:{fontSize:10,fontWeight:900,color:'#7aadbe',letterSpacing:'.1em',marginBottom:10}},
        'CLIENTES ('+filtered.length+')'),
      filtered.length===0&&React.createElement('div',{style:{textAlign:'center',color:'#7aadbe',padding:30,fontSize:13}},
        search?'No se encontró ningún cliente.':'Sin clientes registrados aún.'),
      filtered.map(u=>React.createElement(UserCard,{key:u.email||u.uid,u,onSelect:u=>{setSelUser(u);setView('ficha');},onDelete:deleteUser,deleting:deletingUser===(u.uid||u.email)}))
    )
  );
}


function UserFicha({user:u,trainer,onBack}){
  var trainerColor=(trainer&&trainer.color)||'#00bcd4';
  var trainerLight=(trainer&&trainer.light)||'#152535';
  const [routines,setRoutines]=useState({});
  const [weekAtt,setWeekAtt]=useState({});
  const [selDay,setSelDay]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [dayRtn,setDayRtn]=useState([]);
  const [notes,setNotes]=useState({});
  const [loading,setLoading]=useState(false);
  const [ver,setVer]=useState(0);
  // Profile editing (trainer only)
  const [profileTab,setProfileTab]=useState('routine'); // routine | profile
  const [pDraft,setPDraft]=useState({...u});
  const [savingProfile,setSavingProfile]=useState(false);
  const [profileSaved,setProfileSaved]=useState(false);

  const ALL_OBJECTIVES=['Acondicionamiento','Hipertrofia','Fuerza general','Resistencia','Tonificación','Movilidad','Rehabilitación','Pérdida de grasa','Desafío de fuerza'];

  function toggleObj(o){
    const cur=Array.isArray(pDraft.objetivo)?pDraft.objetivo:(pDraft.objetivo?[pDraft.objetivo]:[]);
    const next=cur.includes(o)?cur.filter(x=>x!==o):[...cur,o];
    setPDraft(d=>({...d,objetivo:next}));
  }

  async function handleAvatarUpload(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    if(file.size>2000000){alert('Imagen demasiado grande. Máximo 2 MB.');return;}
    try{
      const result=await DB.uploadAvatar(u.email,file);
      // Si usó Storage, guardar URL; si base64, guardar data URL
      setPDraft(d=>({...d,avatar:result.url,avatarType:result.type}));
    }catch(err){
      // Fallback a base64 si hay error
      if(file.size>500000){alert('Error al subir la imagen. Intenta con una más pequeña (máx 500 KB).');return;}
      const reader=new FileReader();
      reader.onload=ev=>setPDraft(d=>({...d,avatar:ev.target.result,avatarType:'base64'}));
      reader.readAsDataURL(file);
    }
  }

  async function saveProfile(){
    setSavingProfile(true);
    const dataToSave={...pDraft,profileStatus:'active',accessStatus:getAccessStatus(pDraft),accessBlocked:isAccessBlocked(pDraft),accessUpdatedAt:Date.now()};
    // Trainer token enforced — 'trainer' role check in DB helper
    await DB.saveUserProfile(u.uid||u.email,dataToSave,trainer);
    setSavingProfile(false);
    setProfileSaved(true);
    setTimeout(()=>setProfileSaved(false),2500);
  }

  useEffect(()=>{
    let mounted = true;
    async function load(){
      if(mounted) setLoading(true);
      try{
        const rtn = await DB.getAllRoutines(u.uid||u.email);
        const att = await DB.getWeekAtt(u.uid||u.email);
        if(mounted){ setRoutines(rtn||{}); setWeekAtt(att||{}); }
      }catch(e){
        console.error('UserFicha load error:', e);
      }finally{
        if(mounted) setLoading(false);
      }
    }
    load();
    return ()=>{ mounted=false; };
  },[u.uid,u.email,ver]);

  async function loadNotes(exIds){
    const n={};
    for(const id of exIds){n[id]=await DB.getNote(u.uid||u.email,id);}
    setNotes(n);
  }

  function openDay(dk){
    setSelDay(dk);
    const exs=routines[dk]||[];
    setDayRtn(exs.map(ex=>({...ex})));
    loadNotes(exs.map(e=>e.id));
    setEditMode(false);
  }

  async function saveDay(){
    try{
      await DB.saveRoutine(u.uid||u.email,selDay,dayRtn);
      setRoutines(r=>({...r,[selDay]:dayRtn}));
      setVer(v=>v+1);
      setSelDay(null);
    }catch(e){
      console.error('saveDay error:',e);
      alert('Error al guardar: '+(e.message||'verifica tu conexión'));
    }
  }

  function updateEx(id,field,delta){
    setDayRtn(rtn=>rtn.map(ex=>{
      if(ex.id!==id)return ex;
      const cur=parseInt(ex[field])||( field==='sets'?3:10);
      return {...ex,[field]:Math.max(1,cur+delta)};
    }));
  }

  const today=new Date().getDay();
  const todayKey=DAY_KEYS[today===0?6:today-1];
  const done=DAY_KEYS.filter(dk=>weekAtt[dk]&&weekAtt[dk].s==='done').length;
  const missed=DAY_KEYS.filter(dk=>weekAtt[dk]&&weekAtt[dk].s==='missed').length;

  // Day edit view
  if(selDay) return React.createElement(DayEditTrainer,{
    user:u, trainer, day:selDay, exercises:dayRtn, notes,
    onBack:()=>setSelDay(null),
    onSave:saveDay,
    onUpdateEx:updateEx,
    onSetRtn:setDayRtn,
    onSaveNote:async(exId,note)=>{
      await DB.saveNote(u.uid||u.email,exId,note,trainer);
      setNotes(n=>({...n,[exId]:note}));
    }
  });

  return React.createElement('div',{className:'scr'},
    React.createElement(BrandLogo,null),
    React.createElement('div',{className:'hdr'},
      React.createElement('button',{className:'hdr-back',onClick:onBack},'Volver'),
      React.createElement('div',{className:'hdr-title'},'FICHA: '+(u.name||u.email||'Usuario').toUpperCase())
    ),
    // Tabs: Rutina | Perfil
    React.createElement('div',{style:{display:'flex',background:'#152535',borderBottom:'1px solid #00bcd420',flexShrink:0}},
      [{id:'routine',label:'Rutina'},{id:'profile',label:'Perfil'}].map(t=>
        React.createElement('button',{key:t.id,onClick:()=>setProfileTab(t.id),style:{flex:1,padding:'10px',border:'none',background:'transparent',fontWeight:700,fontSize:12,color:profileTab===t.id?trainerColor:'#7aadbe',borderBottom:'2px solid '+(profileTab===t.id?trainerColor:'transparent'),cursor:'pointer'}},t.label)
      )
    ),
    loading?React.createElement('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}},React.createElement('div',{className:'spin'})):
    profileTab==='profile'?
    // ── PROFILE EDIT TAB ────────────────────────────────────────────────────
    React.createElement('div',{className:'scrollable',style:{padding:14,background:'#0d1b2a'}},
      // Trainer banner
      React.createElement('div',{style:{background:'#152535',border:'1px solid '+trainerColor+'33',borderRadius:10,padding:'8px 12px',marginBottom:12,fontSize:11,color:trainerColor,fontWeight:700}},
        '✏ Editando perfil de: '+(u.name||u.email||'Usuario')+' — Solo el entrenador puede modificar estos datos.'
      ),
      // Avatar
      React.createElement('div',{style:{textAlign:'center',marginBottom:16}},
        React.createElement(AvatarCircle,{user:pDraft,size:80,fontSize:32}),
        React.createElement('div',{style:{marginTop:10}},
          React.createElement('label',{style:{display:'inline-block',padding:'7px 16px',background:trainerColor,borderRadius:8,color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}},
            'Cambiar foto',
            React.createElement('input',{type:'file',accept:'image/*',onChange:handleAvatarUpload,style:{display:'none'}})
          )
        ),
        pDraft.avatar&&React.createElement('button',{onClick:()=>setPDraft(d=>({...d,avatar:''})),style:{marginTop:6,display:'block',margin:'6px auto 0',background:'transparent',border:'none',color:'#7aadbe',fontSize:11,cursor:'pointer'}},'✕ Quitar foto')

function DayEditTrainer({user:u,trainer,day,exercises,notes,onBack,onSave,onUpdateEx,onSetRtn,onSaveNote}){
  const [tab,setTab]=useState('exercises'); // exercises | add
  const [openCat,setOpenCat]=useState(null);
  const [noteEditing,setNoteEditing]=useState(null); // exerciseId
  const [noteDraft,setNoteDraft]=useState('');
  const [exEditing,setExEditing]=useState(null); // exerciseId for global info edit
  const [exInfoDraft,setExInfoDraft]=useState({links:[],description:''}); // draft glo
  const [exEditErr,setExEditErr]=useState(''); // error al abrir/guardar info ejerciciobal info (links: [{url,label}])
  const [exInfoCache,setExInfoCache]=useState({}); // exId -> info from Firestore
  const [savingEx,setSavingEx]=useState(false);
  const [catalogVersion,setCatalogVersion]=useState(0);
  const [newExOpen,setNewExOpen]=useState(false);
  const [newExDraft,setNewExDraft]=useState(defaultNewExerciseDraft());
  const [savingNewEx,setSavingNewEx]=useState(false);

  // Load global custom exercise catalog and keep it synced for all trainers
  useEffect(()=>{
    let mounted=true;
    function applyCatalog(customs){
      mergeCustomExercises(customs||[]);
      if(mounted)setCatalogVersion(v=>v+1);
    }
    async function loadCustomCatalog(){
      try{
        const customs = await DB.getCustomExercises();
        applyCatalog(customs);
      }catch(e){
        console.warn('custom exercise catalog error:', e);
      }
    }
    loadCustomCatalog();
    const unsub = DB.watchCustomExercises(applyCatalog);
    return ()=>{mounted=false; if(typeof unsub==='function')unsub();};
  },[]);

  // Load exInfo for all exercises in this day
  useEffect(()=>{
    let mounted=true;
    async function loadAllInfo(){
      const cache={};
      for(const ex of exercises){
        try{
          const info=await DB.getExInfo(ex.id);
          if(info)cache[ex.id]=info;
        }catch(e){
          console.warn('getExInfo cache error:', ex.id, e);
        }
      }
      if(mounted) setExInfoCache(cache);
    }
    if(exercises.length)loadAllInfo();
    else setExInfoCache({});
    return ()=>{mounted=false;};
  },[exercises]);

  async function openExEdit(exId){
    setExEditErr('');
    let info;
    try{ info=await DB.getExInfo(exId); }
    catch(e){ setExEditErr('Error al cargar info: '+(e.message||'verifica conexión')); return; }
    const baseEx=exercises.find(e=>e.id===exId)||{};
    let links=[];
    if(!info){
      // Nunca editado: pre-cargar links originales del catálogo para comodidad
      const defaultLabels=['Tutorial principal','Tutorial alternativo','Tutorial extra'];
      [baseEx.video,baseEx.video2,baseEx.video3].forEach((u,i)=>{
        if(u)links.push({url:u,label:defaultLabels[i]});
      });
      if(baseEx.link)links.push({url:baseEx.link,label:baseEx.linkLabel||'Enlace'});
    } else if(Array.isArray(info.links)){
      // Ya fue editado: respetar su lista aunque sea vacía
      links=info.links.map(l=>({url:l.url||'',label:l.label||''}));
    } else {
      // Registro legacy (campos video/video2/video3) → migrar
      const defaultLabels=['Tutorial principal','Tutorial alternativo','Tutorial extra'];
      ['video','video2','video3'].forEach((k,i)=>{
        if(info[k])links.push({url:info[k],label:defaultLabels[i]});
      });
      if(info.link)links.push({url:info.link,label:info.linkLabel||'Enlace del entrenador'});
    }
    setExInfoDraft({links,description:info?info.description||'':'',customImg:(info&&info.customImg)||baseEx.customImg||''});
    setExEditing(exId);
  }

  async function saveExInfo(){
    setSavingEx(true);
    try{
      const cleanLinks=(exInfoDraft.links||[]).filter(l=>l.url&&l.url.trim());
      const dataToSave={links:cleanLinks,description:exInfoDraft.description||'',customImg:exInfoDraft.customImg||''};
      await DB.saveExInfo(exEditing,dataToSave);
      setExInfoCache(c=>({...c,[exEditing]:{...dataToSave}}));
      setExEditing(null);
    }catch(e){
      console.error('saveExInfo error:',e);
      alert('Error al guardar info: '+(e.message||'verifica conexión'));
    }
    setSavingEx(false);
  }

  function removeEx(id){onSetRtn(rtn=>rtn.filter(e=>e.id!==id));}
  function addEx(ex){
    if(exercises.find(e=>e.id===ex.id)){onSetRtn(rtn=>rtn.filter(e=>e.id!==ex.id));return;}
    onSetRtn(rtn=>[...rtn,{...ex,sets:3,reps:10,rest:60}]);
  }

  function handleNewExerciseImageFile(file){
    if(!file)return;
    compressImageFile(file, dataUrl=>setNewExDraft(d=>({...d,image:dataUrl})), ()=>alert('No se pudo cargar la imagen.'));
  }

  function handleEditExerciseImageFile(file){
    if(!file)return;
    compressImageFile(file, dataUrl=>setExInfoDraft(d=>({...d,customImg:dataUrl})), ()=>alert('No se pudo cargar la imagen.'));
  }

  async function createNewExercise(){
    const name=(newExDraft.name||'').trim();
    const category=newExDraft.category;
    if(!name){ alert('Escribe el nombre del ejercicio.'); return; }
    if(!category || !CAT[category]){ alert('Selecciona una categoría válida.'); return; }
    setSavingNewEx(true);
    try{
      const id='C'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,6).toUpperCase();
      const link=(newExDraft.link||'').trim();
      const image=(newExDraft.image||'').trim();
      const ex={
        id, name, category, custom:true, customImg:image,
        zone:'Personalizado', machine:'Personalizado', video:link
      };
      const info={
        ...ex,
        isCustomExercise:true,
        links:link?[{url:link,label:'Tutorial principal'}]:[],
        description:(newExDraft.description||'').trim(),
        createdBy:(trainer&&trainer.uid)||(trainer&&trainer.email)||'',
        createdAt:Date.now()
      };
      await DB.saveCustomExercise(ex,info);
      mergeCustomExercises([info]);
      setExInfoCache(c=>({...c,[id]:info}));
      setCatalogVersion(v=>v+1);
      setOpenCat(category);
      setNewExDraft(defaultNewExerciseDraft());
      setNewExOpen(false);
      setTab('add');
      alert('Ejercicio creado en el catálogo global. Para asignarlo, selecciónalo en la categoría correspondiente y luego guarda la rutina del cliente.');
    }catch(e){
      console.error('createNewExercise error:',e);
      alert('Error al crear el ejercicio: '+(e.message||'verifica conexión'));
    }
    setSavingNewEx(false);
  }

  return React.createElement('div',{className:'scr'},
    React.createElement(BrandLogo,null),
    React.createElement('div',{className:'hdr'},
      React.createElement('button',{className:'hdr-back',onClick:onBack},'Volver'),
      React.createElement('div',{className:'hdr-title'},'RUTINA '+DAY_LABELS[day].toUpperCase())
    ),
    // Trainer banner
    React.createElement('div',{style:{background:'#152535',borderBottom:'1px solid '+trainer.color+'33',padding:'6px 14px',fontSize:11,color:trainer.color,fontWeight:700,flexShrink:0}},
      'Editando rutina de: '+u.name
    ),
    // Tabs
    React.createElement('div',{style:{display:'flex',background:'#152535',borderBottom:'1px solid #00bcd420',flexShrink:0}},
      [{id:'exercises',label:'Ejercicios ('+exercises.length+')'},{id:'add',label:'+ Añadir ejercicio'}].map(t=>
        React.createElement('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:'10px',border:'none',background:'transparent',fontWeight:700,fontSize:12,color:tab===t.id?trainer.color:'#7aadbe',borderBottom:'2px solid '+(tab===t.id?trainer.color:'transparent'),cursor:'pointer'}},t.label)
      )
    ),
    React.createElement('div',{className:'scrollable',style:{padding:14,background:'#0d1b2a'}},
      tab==='exercises'&&React.createElement('div',null,
        exercises.length===0&&React.createElement('div',{style:{textAlign:'center',color:'#7aadbe',padding:20}},'Sin ejercicios. Añade desde la pestaña +'),
        exercises.map((ex,i)=>React.createElement('div',{key:ex.id,className:'card',style:{padding:0,overflow:'hidden',marginBottom:10}},
          // Exercise header
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px'}},
            React.createElement('div',{style:{width:40,height:40,borderRadius:8,background:exColor(ex.id)+'22',border:'1px solid '+exColor(ex.id)+'33',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,color:exColor(ex.id)}},
              getExerciseImage(ex,exInfoCache[ex.id])?React.createElement('img',{src:getExerciseImage(ex,exInfoCache[ex.id]),loading:'lazy',decoding:'async',style:{width:'100%',height:'100%',objectFit:'contain'}}):React.createElement('img',{src:IMG_PLACEHOLDER,loading:'lazy',decoding:'async',style:{width:'100%',height:'100%',objectFit:'contain',opacity:0.4}})
            ),
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{style:{fontWeight:700,fontSize:13,color:'#e2f7fb'}},ex.name),
              // Series/reps controls
              React.createElement('div',{style:{display:'flex',gap:6,marginTop:5,alignItems:'center'}},

            React.createElement('label',{className:'label'},'Nombre del ejercicio'),

            React.createElement('label',{className:'label'},'Categoría'),
            React.createElement('select',{className:'inp',value:newExDraft.category,onChange:e=>setNewExDraft(d=>({...d,category:e.target.value})),style:{marginBottom:10}},
              getCategoryOptions().map(cat=>React.createElement('option',{key:cat,value:cat},cat))
            ),
            React.createElement('label',{className:'label'},'Imagen'),

            React.createElement('input',{className:'inp',value:newExDraft.image,onChange:e=>setNewExDraft(d=>({...d,image:e.target.value})),placeholder:'URL de imagen o sube un archivo',style:{marginBottom:6}}),

        ),
        React.createElement('div',{style:{fontSize:10,fontWeight:900,color:'#7aadbe',letterSpacing:'.08em',margin:'6px 0 8px'}},'CATÁLOGO DE EJERCICIOS'),

}

(function bootJuandaFit(){
  function showMissingDeps(){
    document.body.style.cssText = 'background:#0d1b2a;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;';
    document.body.innerHTML = '<div style="text-align:center;color:#e2f7fb;padding:32px;max-width:320px"><div style="font-size:48px;margin-bottom:16px">📡</div><div style="font-size:18px;font-weight:700;color:#00bcd4;margin-bottom:12px">No se pudo cargar JuandaFit</div><div style="font-size:13px;color:#a8cdd8;line-height:1.6">Verifica la conexión a internet y recarga la página.</div><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;border-radius:12px;border:none;background:#00bcd4;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Reintentar</button></div>';
  }

  function start(){
    if(typeof React === 'undefined' || typeof ReactDOM === 'undefined' || !initFirebaseOnce()){
      showMissingDeps();
      return;
    }
    ({useState,useEffect,useRef,useCallback} = React);
    const root=document.getElementById('root');
    if(!root){ showMissingDeps(); return; }
    ReactDOM.createRoot(root).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
  }

  if(document.readyState === 'loading'){
    window.addEventListener('DOMContentLoaded', start);
  }else{
    setTimeout(start,0);
  }
})();
</script>
